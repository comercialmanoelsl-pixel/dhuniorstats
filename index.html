
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meu Futebol Live</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0}
header{padding:16px 20px;background:#111827;display:flex;gap:12px;align-items:center;justify-content:space-between}
h1{font-size:20px;margin:0}button,input{padding:10px;border-radius:8px;border:0}
button{cursor:pointer;background:#22c55e;color:#06250f;font-weight:bold}input{background:#1f2937;color:#fff}
main{padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.card{background:#111827;border:1px solid #334155;border-radius:12px;padding:12px}.live{border-color:#ef4444}
.teams{display:flex;justify-content:space-between;gap:8px;font-size:16px;font-weight:bold}.meta{color:#94a3b8;font-size:12px;margin-top:8px}
.score{font-size:22px;color:#facc15}.details{display:none;margin-top:12px;border-top:1px solid #334155;padding-top:10px}
table{width:100%;border-collapse:collapse;font-size:12px}td,th{border-bottom:1px solid #334155;padding:5px;text-align:left}
.pill{background:#1f2937;border-radius:999px;padding:4px 8px;color:#cbd5e1}
</style>
</head>
<body>
<header><h1>Meu Futebol Live</h1><div><input type="date" id="date"><button onclick="carregar()">Atualizar</button></div></header>
<main><div id="status">Carregando...</div><div class="grid" id="jogos"></div></main>
<script>
const dateInput=document.getElementById("date");dateInput.value=new Date().toISOString().slice(0,10);
async function carregar(){
 const status=document.getElementById("status"),box=document.getElementById("jogos");
 status.textContent="Buscando jogos...";
 const r=await fetch("/api/jogos?date="+dateInput.value);const data=await r.json();
 if(!data.ok){status.textContent="Erro: "+data.error;return}
 status.textContent=`${data.total} jogos encontrados. Atualiza a cada 20s.`;box.innerHTML="";
 data.jogos.forEach(j=>{
  const card=document.createElement("div");card.className="card "+(j.tipoStatus==="inprogress"?"live":"");
  card.innerHTML=`<div class="meta">${j.campeonato}</div>
  <div class="teams"><span>${j.casa}</span><span class="score">${j.placar||"-"}</span><span>${j.fora}</span></div>
  <div class="meta"><span class="pill">${j.status}</span> <span>${j.minuto||""}</span> <span>${j.inicio||""}</span></div>
  <button style="margin-top:10px" onclick="detalhes('${j.id}',this)">Detalhes</button><div class="details"></div>`;
  box.appendChild(card);
 });
}
async function detalhes(id,btn){
 const div=btn.nextElementSibling;div.style.display="block";div.innerHTML="Carregando detalhes...";
 const r=await fetch("/api/jogo/"+id);const data=await r.json();if(!data.ok){div.innerHTML="Erro: "+data.error;return}
 let html=`<h3>${data.jogo.casa} ${data.jogo.placar||""} ${data.jogo.fora}</h3>`;
 html+="<h4>Estatísticas do time</h4><table><tr><th>Time</th><th>Estatística</th><th>Valor</th></tr>";
 data.statsTime.forEach(s=>html+=`<tr><td>${s.time}</td><td>${s.estatistica}</td><td>${s.valor}</td></tr>`);html+="</table>";
 html+="<h4>Eventos</h4><table><tr><th>Min</th><th>Time</th><th>Jogador</th><th>Tipo</th></tr>";
 data.eventos.forEach(e=>html+=`<tr><td>${e.minuto}</td><td>${e.time}</td><td>${e.jogador}</td><td>${e.tipo} ${e.detalhe}</td></tr>`);html+="</table>";
 html+="<h4>Jogadores</h4><table><tr><th>Time</th><th>Jogador</th><th>Nota</th><th>Chutes</th><th>Faltas sofridas</th><th>Desarmes</th></tr>";
 data.jogadores.forEach(p=>html+=`<tr><td>${p.time}</td><td>${p.jogador}</td><td>${p.nota}</td><td>${p.chutesTotal}</td><td>${p.faltasSofridas}</td><td>${p.desarmes}</td></tr>`);html+="</table>";
 div.innerHTML=html;
}
carregar();setInterval(carregar,20000);
</script>
</body></html>
