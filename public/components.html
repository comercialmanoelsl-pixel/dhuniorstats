<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DhuniorStats V41 Components</title><style>body{margin:0;background:#eef2f7;font-family:Arial;color:#07152b}header{height:54px;background:white;border-bottom:1px solid #dbe4ef;display:flex;gap:14px;align-items:center;padding:0 16px}.logo{font-size:22px;font-weight:900}.logo span{color:#ef233c}main{max-width:1200px;margin:18px auto;padding:0 12px}.card{background:white;border:1px solid #dbe4ef;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 8px 20px #0001}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.field,button{border:1px solid #dbe4ef;border-radius:10px;padding:11px;font-weight:800}button{cursor:pointer;background:#fff}.primary{background:#ef233c;color:#fff}.pill{display:inline-flex;border:1px solid #dbe4ef;border-radius:999px;padding:6px 9px;margin:3px;font-size:12px;font-weight:800}.match{display:grid;grid-template-columns:1fr 160px 1fr;gap:16px;text-align:center;align-items:center}.team img{width:56px;height:56px;object-fit:contain}.score{font-size:42px;font-weight:900}.table{width:100%;border-collapse:collapse;font-size:13px}.table td,.table th{border-bottom:1px solid #dbe4ef;padding:8px;text-align:left}.stat{display:grid;grid-template-columns:80px 1fr 80px;gap:10px;align-items:center;margin:8px 0}.bar{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden}.bar span{display:block;height:100%;background:#ef233c}.pitch{position:relative;height:420px;background:#31924f;border-radius:18px;overflow:hidden}.pitch:before{content:"";position:absolute;left:50%;top:0;bottom:0;border-left:1px solid #fff8}.player{position:absolute;transform:translate(-50%,-50%);text-align:center;color:white;font-size:11px;font-weight:900;text-shadow:0 1px 2px #000}.num{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:white;color:#111;border:2px solid #111;margin:auto}pre{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:12px;overflow:auto;max-height:330px}</style></head><body><header><div class="logo">Dhunior<span>Stats</span></div><b>V41 Components Core</b><button onclick="location.href='/'">Início</button></header><main><div class="card"><h2>SportMonks Components Core</h2><div class="grid"><input class="field" id="fixtureId" placeholder="Fixture ID" value=""><button class="primary" onclick="loadFixture()">Carregar fixture</button><input class="field" id="seasonId" placeholder="Season ID" value="25583"><button onclick="loadStandings()">Tabela</button><button onclick="loadTopscorers()">Artilheiros</button></div></div><div id="out"></div></main><script>const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])),val=x=>x??'-';function header(f){return `<div class="card match"><div class="team"><img src="${esc(f.home?.logo||'')}"><h3>${esc(f.home?.name||'Casa')}</h3><span class="pill">home</span></div><div><div class="score">${val(f.score?.home)} x ${val(f.score?.away)}</div><b>${esc(f.state||'')}</b><br><small>${esc(f.starting_at||'')}</small><br><small>${esc(f.league||'')}</small></div><div class="team"><img src="${esc(f.away?.logo||'')}"><h3>${esc(f.away?.name||'Fora')}</h3><span class="pill">away</span></div></div>`}function stats(s){let keys=['possession','shots','shotsOnGoal','corners','fouls','yellowCards','redCards','xg','attacks','dangerousAttacks','passes'];let rows=keys.map(k=>{let h=Number(s.home?.[k]||0),a=Number(s.away?.[k]||0);if(!h&&!a)return'';let p=h/(h+a||1)*100;return `<div class="stat"><b>${h}</b><div><small>${esc(k)}</small><div class="bar"><span style="width:${p}%"></span></div></div><b style="text-align:right">${a}</b></div>`}).join('');return `<div class="card"><h2>Estatísticas</h2>${rows||'<p>Sem estatísticas.</p>'}</div>`}function timeline(e){return `<div class="card"><h2>Timeline</h2>${e.length?e.map(x=>`<div class="table"><b>${val(x.minute)}'</b> ${esc(x.type)} · ${esc(x.side)} · ${esc(x.player)} ${x.related_player?'→ '+esc(x.related_player):''}<br><small>${esc(x.info||x.addition||x.result||'')}</small></div>`).join(''):'<p>Sem eventos.</p>'}</div>`}function lineups(l){let home=l.filter(x=>x.side==='home').slice(0,11),away=l.filter(x=>x.side==='away').slice(0,11);let nodes=(arr,side)=>arr.map((p,i)=>{let x=side==='home'?12+(i%4)*10:88-(i%4)*10,y=12+Math.floor(i/4)*25+(i%4)*4;return `<div class="player" style="left:${x}%;top:${Math.min(y,88)}%"><div class="num">${esc(p.number||'-')}</div>${esc((p.name||'').split(' ').slice(-1)[0])}</div>`}).join('');return `<div class="card"><h2>Escalação</h2>${l.length?`<div class="pitch">${nodes(home,'home')}${nodes(away,'away')}</div>`:'<p>Sem lineup retornada. Não inventa.</p>'}</div>`}function sidelined(list){return `<div class="card"><h2>Lesões / Suspensos</h2><table class="table"><tr><th>Lado</th><th>Jogador</th><th>Tipo</th><th>Desde</th><th>Jogos fora</th></tr>${list.length?list.map(x=>`<tr><td>${esc(x.side)}</td><td>${esc(x.player||x.player_id)}</td><td>${esc(x.type||x.category)}</td><td>${esc(x.start_date)}</td><td>${val(x.games_missed)}</td></tr>`).join(''):'<tr><td colspan=5>Sem dados.</td></tr>'}</table></div>`}function news(n){return `<div class="card"><h2>Notícias</h2>${n.length?n.map(x=>`<h3>${esc(x.title)}</h3><p>${esc(x.text).slice(0,700)}</p>`).join(''):'<p>Sem notícias.</p>'}</div>`}async function loadFixture(){out.innerHTML='<div class="card">Carregando...</div>';let id=fixtureId.value.trim();let d=await fetch('/api/sm/components/fixture/'+id+'?_='+Date.now()).then(r=>r.json());if(!d.ok){out.innerHTML='<div class="card">Erro: '+esc(d.error)+'</div>';return}out.innerHTML=[header(d.fixture),`<div class="card"><h2>Cobertura</h2><span class="pill">events: ${d.events.length}</span><span class="pill">stats: ${Object.keys(d.statistics.home||{}).length+Object.keys(d.statistics.away||{}).length}</span><span class="pill">lineups: ${d.lineups.length}</span><span class="pill">sidelined: ${d.sidelined.length}</span><span class="pill">predictions: ${d.predictions.length}</span><span class="pill">trends: ${d.trends.length}</span><span class="pill">news: ${d.news.length}</span></div>`,stats(d.statistics),timeline(d.events),lineups(d.lineups),sidelined(d.sidelined),news(d.news),`<div class="card"><h2>Raw resumido</h2><pre>${esc(JSON.stringify({fixture:d.fixture,referees:d.referees,trends:d.trends.slice(0,8)},null,2))}</pre></div>`].join('')}async function loadStandings(){out.innerHTML='<div class="card">Carregando...</div>';let d=await fetch('/api/sm/components/standings/'+seasonId.value.trim()+'?_='+Date.now()).then(r=>r.json());out.innerHTML=`<div class="card"><h2>Tabela</h2><table class="table"><tr><th>Pos</th><th>Time</th><th>Pts</th></tr>${(d.standings||[]).map(s=>`<tr><td>${val(s.position)}</td><td>${esc(s.participant?.name||s.participant_id)}</td><td>${val(s.points)}</td></tr>`).join('')}</table></div>`}async function loadTopscorers(){out.innerHTML='<div class="card">Carregando...</div>';let d=await fetch('/api/sm/components/topscorers/'+seasonId.value.trim()+'?_='+Date.now()).then(r=>r.json());out.innerHTML=`<div class="card"><h2>Artilheiros</h2><table class="table"><tr><th>#</th><th>Jogador</th><th>Time</th><th>Total</th></tr>${(d.topscorers||[]).map((s,i)=>`<tr><td>${i+1}</td><td>${esc(s.player?.display_name||s.player?.name||s.player_id)}</td><td>${esc(s.participant?.name||s.participant_id)}</td><td>${val(s.total)}</td></tr>`).join('')}</table></div>`}loadFixture()</script></body></html>
