<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DhuniorStats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css"/>
</head>
<body data-theme="light">
<header class="topbar">
  <div class="logo">Dhunior<span>Stats</span></div>
  <input class="search" id="searchInput" placeholder="Pesquisar time, liga ou partida">
  <div class="topActions">
    <button class="topBtn" onclick="showHome()">Início</button>
    <button class="topBtn" onclick="setLive()">Ao vivo</button>
    <button class="topBtn" onclick="setFav()">Favoritos</button>
  </div>
  <div class="theme"><button id="lightBtn" class="active">Claro</button><button id="darkBtn">Escuro</button></div>
</header>

<div class="app">
  <aside class="left card">
    <div class="filters">
      <input class="field" type="date" id="dateInput">
      <select class="field" id="filterInput">
        <option value="">Todos</option>
        <option value="live">Ao vivo</option>
        <option value="pre">Futuros</option>
        <option value="post">Finalizados</option>
        <option value="fav">Favoritos</option>
      </select>
    </div>
    <div class="leagueWrap">
      <button class="qArrow left" onclick="document.querySelector('.quick').scrollBy({left:-170,behavior:'smooth'})">‹</button>
      <div class="quick">
        <button data-q="" class="active">⭐ Todos</button>
        <button data-q="Brasileirão">🇧🇷 Brasileirão</button>
        <button data-q="Libertadores">🏆 Libertadores</button>
        <button data-q="Sudamericana">🌎 Sul-Americana</button>
        <button data-q="Premier">🏴 Premier</button>
        <button data-q="Serie A">🇮🇹 Serie A</button>
        <button data-q="La Liga">🇪🇸 La Liga</button>
      </div>
      <button class="qArrow right" onclick="document.querySelector('.quick').scrollBy({left:170,behavior:'smooth'})">›</button>
    </div>
    <div class="matchList" id="matchList"></div>
    <button class="btn" id="refreshBtn" style="margin:7px 11px 11px">Atualizar</button>
  </aside>

  <main class="center">
    <div id="homeView"></div>
    <div id="matchView" style="display:none">
      <div class="card scoreboard" id="scoreboard"></div>
      <div class="card panel" id="mainPanel"></div>
    </div>
  </main>

  <aside class="right">
    <div class="card sideNav">
      <button class="active" data-side="ia">🧠 Leitura IA</button>
      <button data-side="base">📌 Base</button>
      <button data-side="events">⚡ Eventos</button>
      <button data-side="lineups">🧩 Escalações</button>
      <button data-side="table">🏆 Tabela</button>
      <button data-side="news">📰 Notícias</button>
    </div>
    <div class="card sideContent" id="sideContent"></div>
  </aside>
</div>

<script src="/js/app.js"></script>
</body>
</html>
