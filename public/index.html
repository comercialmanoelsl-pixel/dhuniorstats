<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DhuniorStats V13</title><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#111827;--muted:#64748b;--line:#dbe3ee;--red:#e11d2e;--green:#16a34a;--yellow:#ca8a04}body.dark{--bg:#050b12;--card:#0d1a2a;--text:#f8fafc;--muted:#93a4ba;--line:#243041}*{box-sizing:border-box}body{margin:0;font-family:Arial, sans-serif;background:var(--bg);color:var(--text)}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:var(--card);border-right:1px solid var(--line);padding:24px;position:sticky;top:0;height:100vh}.brand{font-size:26px;font-weight:900}.brand span{color:var(--red)}.slogan{color:var(--muted);font-size:13px}.nav{display:grid;gap:8px;margin-top:24px}.nav button{border:0;background:transparent;color:var(--muted);text-align:left;padding:13px;border-radius:12px;font-weight:800;cursor:pointer}.nav button.active{background:rgba(225,29,46,.12);color:var(--text)}.theme{margin-top:18px;width:100%;padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);cursor:pointer}.main{padding:24px}.top{display:flex;gap:10px;flex-wrap:wrap;justify-content:space-between}.controls{display:flex;gap:10px;flex-wrap:wrap}.pill,input,select,button.refresh{padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);font-weight:700}.layout{display:grid;grid-template-columns:1fr 390px;gap:18px;margin-top:18px}.card,.hero,.game{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 30px rgba(0,0,0,.05)}.hero{display:grid;grid-template-columns:1fr 180px 1fr;align-items:center;text-align:center;min-height:220px}.crest{width:82px;height:82px;margin:auto;border-radius:50%;display:grid;place-items:center;background:#111827;color:white;font-size:30px;font-weight:900;overflow:hidden}.crest img{width:100%;height:100%;object-fit:contain;background:white;padding:8px}.score{font-size:42px;font-weight:900}.badge{background:var(--red);color:white;border-radius:999px;padding:6px 12px;font-weight:900;font-size:12px;display:inline-block}.muted{color:var(--muted);font-size:13px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}.stat b{font-size:23px}.bar{height:8px;background:#d1d5db;border-radius:999px;overflow:hidden;display:flex;margin-top:8px}.home{background:var(--green);height:100%}.away{background:var(--red);height:100%}.summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.tag{display:inline-block;border-radius:999px;padding:6px 10px;background:rgba(22,163,74,.15);color:var(--green);font-weight:900;font-size:12px}.bad{background:rgba(225,29,46,.15);color:var(--red)}.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-top:14px}.game{cursor:pointer}.game.active{border-color:var(--red)}.row{display:flex;justify-content:space-between;gap:8px;font-weight:900;margin:8px 0}.sidecards{display:grid;gap:12px}.list{display:grid;gap:8px;color:var(--muted);line-height:1.45}.minirow{display:grid;grid-template-columns:1fr 55px 55px 55px;gap:6px;border-bottom:1px solid var(--line);padding:7px 0;font-size:13px}.hidden{display:none}@media(max-width:1050px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.layout{grid-template-columns:1fr}.grid,.summary{grid-template-columns:1fr 1fr}.hero{grid-template-columns:1fr}}@media(max-width:620px){.grid,.summary{grid-template-columns:1fr}.main{padding:12px}}
</style></head><body><div class="app"><aside class="side"><div class="brand">Dhunior<span>Stats</span></div><div class="slogan">Além das estatísticas</div><div class="nav"><button class="active" data-tab="radar">📡 Radar</button><button data-tab="finalizacoes">🎯 Finalizações</button><button data-tab="gol">🥅 Chutes no gol</button><button data-tab="escanteios">🚩 Escanteios</button><button data-tab="contexto">📊 Contexto</button><button data-tab="noticias">📰 Notícias</button></div><button class="theme" id="theme">Alternar tema</button></aside><main class="main"><div class="top"><div class="controls"><div class="pill">Radar DhuniorStats</div><input type="date" id="date"><input id="search" placeholder="Buscar time/liga"><select id="filter"><option value="">Todos</option><option value="live">Ao vivo</option><option value="pre">Futuros</option><option value="post">Finalizados</option></select><button class="refresh" id="refresh">Atualizar</button></div></div><div class="layout"><section><div id="match"></div><div id="summary"></div><div id="stats"></div><div id="games" class="games"></div><div class="muted" id="status"></div></section><aside class="sidecards"><div class="card"><b>🧠 Leitura com base real</b><div id="ai" class="list">Carregando...</div></div><div class="card tabbox" data-box="contexto"><b>Base usada</b><div id="base" class="list"></div></div><div class="card tabbox" data-box="finalizacoes"><b>🎯 Jogadores que mais finalizam</b><div id="players" class="list"></div></div><div class="card tabbox" data-box="noticias"><b>📰 Contexto / Notícias</b><div id="news" class="list"></div></div><div class="card"><b>Eventos</b><div id="events" class="list"></div></div></aside></div></main></div><script>
const $=id=>document.getElementById(id);let games=[],sel=null,tab='radar';function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function pct(a,b){a=+a||0;b=+b||0;return a+b?Math.round(a/(a+b)*100):50}function logo(t){return t.logo?`<div class="crest"><img src="${esc(t.logo)}"></div>`:`<div class="crest">${esc((t.name||'?')[0])}</div>`}function drawMatch(g){sel=g;const badge=g.live?'AO VIVO':g.state==='pre'?'PRÉ-JOGO':'FINALIZADO';$('match').innerHTML=`<div class="hero"><div>${logo(g.home)}<h3>${esc(g.home.name)}</h3></div><div><span class="badge">${badge}</span><div class="muted">${esc(g.status||'')}</div><div class="score">${esc(g.home.score)} x ${esc(g.away.score)}</div><div class="muted">${esc(g.league)} · ${esc(g.source)}</div></div><div>${logo(g.away)}<h3>${esc(g.away.name)}</h3></div></div>`;empty();details(g)}function empty(){$('summary').innerHTML='<div class="summary"><div class="card"><b>Pré-jogo</b><p class="muted">Buscando contexto...</p></div><div class="card"><b>Ao vivo</b><p class="muted">Buscando estatísticas...</p></div></div>';$('stats').innerHTML=''}function stats(live){const f=live.finalizations||{},s=live.shotsOnGoal||{},c=live.corners||{},p=live.possession||{};const arr=[['FINALIZAÇÕES',f.home,f.away],['CHUTES NO GOL',s.home,s.away],['POSSE',p.home?p.home+'%':'',p.away?p.away+'%':''],['ESCANTEIOS',c.home,c.away]];$('stats').innerHTML=`<div class="grid">${arr.map(x=>{const pc=pct(parseFloat(x[1]),parseFloat(x[2]));return`<div class="stat"><div class="muted">${x[0]}</div><div class="row"><b>${esc(x[1]||'-')}</b><b>${esc(x[2]||'-')}</b></div><div class="bar"><div class="home" style="width:${pc}%"></div><div class="away" style="width:${100-pc}%"></div></div></div>`}).join('')}</div>`}function renderDetails(d){const a=d.analysis||{},live=a.live||{},pre=a.pregame||{},main=a.main||pre;$('summary').innerHTML=`<div class="summary"><div class="card"><b>Pré-jogo</b><p>${esc(pre.reading||'Sem leitura')}</p><span class="tag ${pre.hasEnoughData?'':'bad'}">Confiança ${esc(pre.confidence||'Baixa')}</span></div><div class="card"><b>Ao vivo</b><p>${esc(live.reading||'Sem estatísticas suficientes')}</p><span class="tag ${live.hasEnoughData?'':'bad'}">Confiança ${esc(live.confidence||'Baixa')}</span></div></div>`;stats(live);$('ai').innerHTML=`<div>${esc(main.reading||'Sem leitura forte')}</div><div class="muted">Fonte: ${esc(a.contextSource||'')}</div>`;$('base').innerHTML=(main.base||[]).map(x=>`<div>✓ ${esc(x)}</div>`).join('')||'Sem base suficiente.';players(d.players||{});$('news').innerHTML=(d.news||[]).map(n=>`<div>✓ ${esc(n.title)} <small>(${esc(n.source)})</small></div>`).join('')||'Notícias não configuradas ou não encontradas.';$('events').innerHTML=(d.events||[]).slice(-10).reverse().map(e=>`<div><b>${esc(e.minute)}</b> ${esc(e.type)} · ${esc(e.detail)} <span class="muted">${esc(e.team)}</span></div>`).join('')||'Sem eventos.';applyTab()}function players(p){const rows=[...(p.home||[]),...(p.away||[])].sort((a,b)=>b.shots-a.shots).slice(0,10);$('players').innerHTML=rows.length?`<div class="minirow"><b>Jogador</b><b>Fin.</b><b>Gol</b><b>Gols</b></div>`+rows.map(r=>`<div class="minirow"><span>${esc(r.player)}</span><span>${r.shots}</span><span>${r.on}</span><span>${r.goals}</span></div>`).join(''):'Sem estatísticas de jogadores disponíveis.'}async function details(g){try{const r=await fetch(`/api/game-details?fixtureId=${encodeURIComponent(g.fixtureId||'')}&game=${encodeURIComponent(JSON.stringify(g))}&_=${Date.now()}`);const d=await r.json();if(!d.ok)throw new Error(d.error);renderDetails(d)}catch(e){$('ai').innerHTML=`<span class="bad">Erro: ${esc(e.message)}</span>`}}function renderGames(){let q=$('search').value.toLowerCase(),f=$('filter').value, list=[...games];if(q)list=list.filter(g=>(g.home.name+' '+g.away.name+' '+g.league).toLowerCase().includes(q));if(f==='live')list=list.filter(g=>g.live);if(f==='pre')list=list.filter(g=>g.state==='pre');if(f==='post')list=list.filter(g=>g.state==='post');$('games').innerHTML=list.map(g=>`<div class="game ${sel&&sel.id===g.id?'active':''}" data-i="${games.indexOf(g)}"><small>${esc(g.league)} · ${esc(g.source)}</small><div class="row"><span>${esc(g.home.name)}</span><span class="game-score">${esc(g.home.score)} x ${esc(g.away.score)}</span><span>${esc(g.away.name)}</span></div><small>${esc(g.status)} ${esc(g.minute)} · ${esc(g.time)}</small></div>`).join('');document.querySelectorAll('.game').forEach(c=>c.onclick=()=>{drawMatch(games[+c.dataset.i]);renderGames()})}async function load(){try{$('status').textContent='Buscando jogos...';const r=await fetch(`/api/games?date=${$('date').value}&_=${Date.now()}`);const d=await r.json();games=d.games||[];const p=games.find(g=>g.fixtureId)||games[0];if(p)drawMatch(p);renderGames();$('status').textContent=`${games.length} jogos encontrados · atualizado ${new Date().toLocaleTimeString('pt-BR')}${d.cached?' · cache':''}`}catch(e){$('status').textContent='Erro: '+e.message}}function applyTab(){document.querySelectorAll('.tabbox').forEach(b=>{b.classList.toggle('hidden',!(tab==='radar'||b.dataset.box===tab|| (tab==='gol'&&b.dataset.box==='finalizacoes') || (tab==='escanteios'&&b.dataset.box==='contexto')))});document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab))}document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;applyTab()});$('date').value=new Date().toISOString().slice(0,10);$('refresh').onclick=load;$('search').oninput=renderGames;$('filter').onchange=renderGames;$('theme').onclick=()=>document.body.classList.toggle('dark');load();setInterval(load,60000);
</script></body></html>
