<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DhuniorStats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#f8fafc;--surface3:#eef3f8;--line:#dbe4ef;
  --text:#0f172a;--muted:#64748b;--brand:#ef233c;--green:#16a34a;--yellow:#d97706;--blue:#2563eb;
  --shadow:0 6px 18px rgba(15,23,42,.06);
}
[data-theme="dark"]{
  --bg:#07111f;--surface:#0f1b2d;--surface2:#132238;--surface3:#182a43;--line:rgba(255,255,255,.09);
  --text:#f8fafc;--muted:#94a3b8;--shadow:0 12px 34px rgba(0,0,0,.32);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif}
button,input,select{font-family:inherit}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px;position:sticky;top:0;z-index:50}
.logo{font-size:24px;font-weight:950;letter-spacing:-.8px;white-space:nowrap}.logo span{color:var(--brand)}
.search{flex:1;max-width:580px;border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:11px;padding:10px 13px;font-weight:700}
.topActions{display:flex;gap:8px;align-items:center}.topBtn{border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:11px;padding:9px 12px;font-weight:850;cursor:pointer}
.theme{display:flex;background:var(--surface2);border:1px solid var(--line);border-radius:999px;padding:3px;gap:3px}.theme button{border:0;background:transparent;color:var(--muted);font-weight:850;padding:7px 10px;border-radius:999px;cursor:pointer}.theme button.active{background:var(--brand);color:#fff}

.app{display:grid;grid-template-columns:360px minmax(520px,1fr) 300px;gap:12px;padding:12px;max-width:1760px;margin:0 auto;height:calc(100vh - 56px)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
.left{min-height:0;display:flex;flex-direction:column;overflow:hidden}
.filters{padding:11px;display:grid;grid-template-columns:1fr 112px;gap:7px}.field,.btn{border:1px solid var(--line);background:var(--surface2);color:var(--text);border-radius:11px;padding:9px 11px;font-weight:800;font-size:13px}.btn{cursor:pointer}
.leagueWrap{position:relative;padding:0 12px 10px}
.quick{display:flex;gap:7px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;padding:2px 34px 4px}.quick::-webkit-scrollbar{display:none}
.quick button{white-space:nowrap;min-width:max-content;border:1px solid var(--line);background:var(--surface2);color:var(--muted);border-radius:999px;padding:8px 13px;font-size:12px;font-weight:850;cursor:pointer;scroll-snap-align:start}
.quick button.active{background:rgba(239,35,60,.10);color:var(--brand);border-color:rgba(239,35,60,.25)}
.qArrow{position:absolute;top:2px;width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;font-weight:950;color:var(--muted);cursor:pointer;box-shadow:var(--shadow)}
.qArrow.left{left:10px}.qArrow.right{right:10px}
.matchList{padding:7px 9px;overflow:auto;min-height:0;display:grid;gap:6px}
.dayTitle{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:950;color:var(--muted);padding:9px 4px 3px}
.match{border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:9px;cursor:pointer;transition:.12s}
.match:hover,.match.active{border-color:var(--brand);box-shadow:0 6px 16px rgba(239,35,60,.08)}
.match small{color:var(--muted);font-weight:750;font-size:11px}
.teamLine{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px;font-weight:850;font-size:13px}
.teamName{display:flex;align-items:center;gap:7px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.miniLogo{width:18px;height:18px;border-radius:50%;background:#fff;object-fit:contain;border:1px solid var(--line);flex:0 0 auto}
.score{font-weight:950;color:var(--yellow)}
.center{min-width:0;min-height:0;overflow:auto}
.right{min-height:0;overflow:auto;display:flex;flex-direction:column;gap:12px}

.homeHero{padding:18px;background:linear-gradient(180deg,var(--surface),var(--surface2))}
.homeTitle{font-size:22px;font-weight:950;margin:0 0 6px;letter-spacing:-.5px}
.homeSub{color:var(--muted);font-weight:650;font-size:13px}
.homeGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px;margin-top:14px}
.feature{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px}
.featureTitle{font-size:13px;color:var(--muted);font-weight:950;text-transform:uppercase;margin-bottom:9px}
.hotGame{display:flex;align-items:center;justify-content:space-between;gap:12px;font-weight:900;font-size:15px}
.hotScore{font-size:24px;font-weight:950;color:var(--yellow)}
.section{margin-top:10px;padding:12px}.sectionTitle{font-weight:950;font-size:15px;margin-bottom:10px}
.compactGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:9px}
.compactCard{border:1px solid var(--line);background:var(--surface2);border-radius:12px;padding:11px;cursor:pointer}
.compactCard:hover{border-color:var(--brand)}
.trendItem{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}.trendItem b{color:var(--text)}

.scoreboard{overflow:hidden}.scoreTop{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.comp{color:var(--muted);font-weight:800;font-size:12px}.status{background:var(--brand);color:#fff;padding:5px 10px;border-radius:999px;font-size:11px;font-weight:950}
.scoreBody{padding:20px;display:grid;grid-template-columns:1fr 140px 1fr;align-items:center;gap:10px;background:linear-gradient(180deg,var(--surface),var(--surface2))}
.mainTeam{text-align:center}.mainLogo{width:62px;height:62px;border-radius:50%;object-fit:contain;background:#fff;border:1px solid var(--line);padding:5px}.fallbackLogo{width:62px;height:62px;border-radius:50%;display:inline-grid;place-items:center;background:var(--surface3);font-size:28px;font-weight:950}.mainName{font-size:17px;font-weight:950;margin-top:7px}
.centerScore{text-align:center}.bigScore{font-size:42px;font-weight:950;letter-spacing:-1.5px}.minute{color:var(--green);font-weight:950;margin-top:3px}
.matchTabs{display:flex;gap:5px;padding:9px;background:var(--surface);border-top:1px solid var(--line);overflow:auto;position:sticky;top:0;z-index:10;scrollbar-width:none}.matchTabs::-webkit-scrollbar{display:none}
.matchTabs button{border:0;background:transparent;color:var(--muted);font-weight:900;padding:9px 10px;border-radius:9px;cursor:pointer;white-space:nowrap;font-size:12px}.matchTabs button.active{background:rgba(239,35,60,.10);color:var(--brand)}
.panel{margin-top:10px;padding:12px}.title{font-size:15px;font-weight:950;margin-bottom:11px}.aiBox{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:13px}.aiText{font-size:15px;line-height:1.35;font-weight:850}
.statsGrid{display:grid;gap:9px}.statRow{border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:11px}.statTop{display:flex;justify-content:space-between;font-size:18px;font-weight:950}.statLabel{text-align:center;color:var(--muted);font-size:11px;font-weight:950;text-transform:uppercase;margin:6px 0}.bar{height:6px;border-radius:999px;overflow:hidden;background:var(--line);display:flex}.homeBar{background:var(--green)}.awayBar{background:var(--brand)}
.trends{display:grid;gap:7px}.trend{padding:10px;border-radius:11px;background:var(--surface2);color:var(--muted);font-size:13px;font-weight:800}.trend.good{color:var(--green)}.trend.bad{color:var(--brand)}
.probs{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0}.prob{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px}.prob b{font-size:22px}
.sideNav{padding:8px;display:grid;gap:6px}.sideNav button{border:0;background:transparent;text-align:left;color:var(--muted);font-weight:850;padding:10px;border-radius:10px;cursor:pointer;font-size:13px}.sideNav button.active,.sideNav button:hover{background:rgba(239,35,60,.10);color:var(--brand)}
.sideContent{padding:12px}.base{display:grid;gap:8px;color:var(--muted);line-height:1.42;font-size:13px}.event{display:grid;grid-template-columns:38px 1fr;gap:7px;border-bottom:1px solid var(--line);padding:7px 0;color:var(--muted);font-size:12px}.event b{color:var(--text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}.infoCard{background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:11px}.infoCard b{display:block;margin-bottom:7px}.momentum{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin:8px 0}.mom{height:28px;border-radius:6px;background:var(--surface3)}.mom.h{background:rgba(22,163,74,.75)}.mom.a{background:rgba(239,35,60,.75)}
.standRow{display:grid;grid-template-columns:30px 1fr 38px 38px 38px;gap:7px;border-bottom:1px solid var(--line);padding:7px 0;font-size:12px}.empty{padding:24px;text-align:center;color:var(--muted);font-weight:800}
.skeleton{background:linear-gradient(90deg,var(--surface2),var(--surface3),var(--surface2));background-size:200% 100%;animation:sk 1.2s infinite;border-radius:10px;height:40px}@keyframes sk{to{background-position:-200% 0}}
@media(max-width:1280px){.app{grid-template-columns:360px minmax(520px,1fr)}.right{display:none}}
@media(max-width:920px){.app{grid-template-columns:1fr;height:auto}.left{height:420px}.right{display:flex}.scoreBody{grid-template-columns:1fr}.homeGrid{grid-template-columns:1fr}body{overflow:auto}.app{height:auto}}
@media(max-width:640px){.topbar{gap:8px}.search{display:none}.topActions{display:none}.app{padding:8px}.filters{grid-template-columns:1fr}.bigScore{font-size:36px}}

.timeline{position:relative;display:grid;gap:0}
.timeline:before{content:"";position:absolute;left:17px;top:6px;bottom:6px;width:2px;background:var(--line)}
.timelineEvent{position:relative;display:grid;grid-template-columns:38px 1fr;gap:8px;padding:7px 0}
.ball{width:26px;height:26px;border-radius:50%;background:var(--surface);border:2px solid var(--brand);display:grid;place-items:center;font-size:11px;font-weight:900;z-index:1}
.eventBody{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:9px;font-size:12.5px;color:var(--muted)}
.eventBody b{color:var(--text)}
.pitch{height:390px;border-radius:14px;background:linear-gradient(180deg,#6fc45a,#4ea33e);position:relative;overflow:hidden;border:3px solid var(--surface)}
.pitch:before{content:"";position:absolute;inset:14px;border:2px solid rgba(255,255,255,.65);border-radius:10px}
.pitch:after{content:"";position:absolute;left:14px;right:14px;top:50%;height:2px;background:rgba(255,255,255,.65)}
.playerDot{position:absolute;width:62px;min-height:34px;border-radius:999px;background:var(--surface);box-shadow:var(--shadow);display:grid;place-items:center;text-align:center;font-size:10px;font-weight:900;padding:5px;border:2px solid var(--green)}
.heat{height:290px;border-radius:14px;background:radial-gradient(circle at 34% 35%,rgba(239,35,60,.65),transparent 14%),radial-gradient(circle at 58% 58%,rgba(245,158,11,.55),transparent 17%),linear-gradient(180deg,#72c760,#4fa645);position:relative;overflow:hidden;border:3px solid var(--surface)}
.heat:before{content:"";position:absolute;inset:16px;border:2px solid rgba(255,255,255,.65);border-radius:10px}
.oddsGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.odd{background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center}
.odd small{color:var(--muted);font-weight:850}.odd b{display:block;font-size:20px;margin-top:4px}
.fadeIn{animation:fade .18s ease}@keyframes fade{from{opacity:.35;transform:translateY(2px)}to{opacity:1;transform:none}}

</style>
</head>
<body data-theme="light">
<header class="topbar">
  <div class="logo">Dhunior<span>Stats</span></div>
  <input class="search" id="searchInput" placeholder="Pesquisar time, liga ou partida">
  <div class="topActions"><button class="topBtn" onclick="showHome()">Início</button><button class="topBtn" onclick="setLive()">Ao vivo</button></div>
  <div class="theme"><button id="lightBtn" class="active">Claro</button><button id="darkBtn">Escuro</button></div>
</header>

<div class="app">
  <aside class="left card">
    <div class="filters"><input class="field" type="date" id="dateInput"><select class="field" id="filterInput"><option value="">Todos</option><option value="live">Ao vivo</option><option value="pre">Futuros</option><option value="post">Finalizados</option><option value="fav">Favoritos</option></select></div>
    <div class="leagueWrap">
      <button class="qArrow left" onclick="document.querySelector('.quick').scrollBy({left:-180,behavior:'smooth'})">‹</button>
      <div class="quick"><button data-q="" class="active">⭐ Todos</button><button data-q="Brasileirão">🇧🇷 Brasileirão</button><button data-q="Libertadores">🏆 Libertadores</button><button data-q="Sudamericana">🌎 Sul-Americana</button><button data-q="Premier">🏴 Premier</button><button data-q="Serie A">🇮🇹 Serie A</button><button data-q="La Liga">🇪🇸 La Liga</button></div>
      <button class="qArrow right" onclick="document.querySelector('.quick').scrollBy({left:180,behavior:'smooth'})">›</button>
    </div>
    <div class="matchList" id="matchList"></div>
    <button class="btn" id="refreshBtn" style="margin:8px 12px 12px">Atualizar</button>
  </aside>

  <main class="center">
    <div id="homeView"></div>
    <div id="matchView" style="display:none">
      <div class="card scoreboard" id="scoreboard"></div>
      <div class="card panel" id="mainPanel"></div>
    </div>
  </main>

  <aside class="right">
    <div class="card sideNav">
      <button class="active" data-side="ia">🧠 Leitura IA</button><button data-side="base">📌 Base</button><button data-side="events">⚡ Eventos</button><button data-side="teams">👥 Times</button><button data-side="players">🎯 Jogadores</button><button data-side="table">🏆 Tabela</button><button data-side="news">📰 Notícias</button>
    </div>
    <div class="card sideContent" id="sideContent"></div>
  </aside>
</div>

<script>
const $=id=>document.getElementById(id);let allGames=[],selected=null,details=null,tab="overview",sideTab="ia",quick="",homeMode=true;
const favs=()=>JSON.parse(localStorage.getItem("favs")||"[]");function saveFavs(a){localStorage.setItem("favs",JSON.stringify(a))}function isFav(name){return favs().includes(name)}function toggleFav(name){let f=favs();f=f.includes(name)?f.filter(x=>x!==name):[...f,name];saveFavs(f);renderMatches();renderScoreboard(selected)}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function pct(a,b){a=Number(a)||0;b=Number(b)||0;const t=a+b;return t?Math.round(a/t*100):50}
function logo(t,cls){return t.logo?`<img class="${cls}" src="${esc(t.logo)}">`:`<span class="fallbackLogo">${esc((t.name||"?")[0])}</span>`}
function miniLogo(t){return t.logo?`<img class="miniLogo" src="${esc(t.logo)}">`:`<span class="miniLogo" style="display:inline-grid;place-items:center;font-size:11px;font-weight:900">${esc((t.name||"?")[0])}</span>`}
function setTheme(t){document.body.dataset.theme=t;localStorage.setItem("theme",t);$("lightBtn").classList.toggle("active",t==="light");$("darkBtn").classList.toggle("active",t==="dark")}$("lightBtn").onclick=()=>setTheme("light");$("darkBtn").onclick=()=>setTheme("dark");setTheme(localStorage.getItem("theme")||"light");
function showHome(){homeMode=true;$("homeView").style.display="block";$("matchView").style.display="none";renderHome()}
function openMatch(g){homeMode=false;$("homeView").style.display="none";$("matchView").style.display="block";loadDetails(g)}
function setLive(){$("filterInput").value="live";renderMatches();showHome()}
function filteredGames(){const q=$("searchInput").value.toLowerCase(),f=$("filterInput").value;let games=[...allGames];if(quick)games=games.filter(g=>g.league.toLowerCase().includes(quick.toLowerCase()));if(q)games=games.filter(g=>(g.home.name+" "+g.away.name+" "+g.league).toLowerCase().includes(q));if(f==="live")games=games.filter(g=>g.live);if(f==="pre")games=games.filter(g=>g.state==="pre");if(f==="post")games=games.filter(g=>g.state==="post");if(f==="fav")games=games.filter(g=>isFav(g.home.name)||isFav(g.away.name));return games}
function renderHome(){const games=filteredGames();const live=games.filter(g=>g.live);const hot=live[0]||games.find(g=>g.state==="post")||games[0];const favGames=games.filter(g=>isFav(g.home.name)||isFav(g.away.name)).slice(0,4);$("homeView").innerHTML=`<div class="card homeHero"><h1 class="homeTitle">Jogos de hoje</h1><div class="homeSub">Acompanhe placares, estatísticas e leitura inteligente dos principais jogos.</div><div class="homeGrid"><div class="feature">${hot?`<div class="featureTitle">Jogo em destaque</div><div class="hotGame"><span>${miniLogo(hot.home)} ${esc(hot.home.name)}</span><span class="hotScore">${esc(hot.home.score)} x ${esc(hot.away.score)}</span><span>${miniLogo(hot.away)} ${esc(hot.away.name)}</span></div><br><button class="btn" onclick="openMatch(allGames[${allGames.indexOf(hot)}])">Abrir partida</button>`:`<div class="empty">Nenhum jogo encontrado.</div>`}</div><div class="feature"><div class="featureTitle">Resumo</div><div class="trendItem"><b>${live.length}</b> jogos ao vivo</div><div class="trendItem"><b>${games.filter(g=>g.state==="post").length}</b> finalizados</div><div class="trendItem"><b>${games.filter(g=>g.state==="pre").length}</b> próximos</div></div></div></div><div class="card section"><div class="sectionTitle">🔥 Partidas em destaque</div><div class="compactGrid">${games.slice(0,8).map(g=>`<div class="compactCard" onclick="openMatch(allGames[${allGames.indexOf(g)}])"><small>${esc(g.league)}</small><div class="teamLine"><span class="teamName">${miniLogo(g.home)}${esc(g.home.name)}</span><span class="score">${esc(g.home.score)}</span></div><div class="teamLine"><span class="teamName">${miniLogo(g.away)}${esc(g.away.name)}</span><span class="score">${esc(g.away.score)}</span></div></div>`).join("")||"<div class='empty'>Sem jogos.</div>"}</div></div><div class="card section"><div class="sectionTitle">🧠 Tendências IA do dia</div><div class="trendItem"><b>Pressão ofensiva</b> jogos com maior volume aparecem primeiro quando houver estatísticas.</div><div class="trendItem"><b>Favoritos</b> salve times para montar sua tela inicial.</div><div class="trendItem"><b>Ao vivo</b> clique em uma partida para abrir estatísticas completas.</div></div>`}
function renderScoreboard(g){if(!g){$("scoreboard").innerHTML=`<div class="empty">Selecione uma partida</div>`;return}const status=g.live?"AO VIVO":g.state==="pre"?"PRÉ-JOGO":"FINALIZADO";$("scoreboard").innerHTML=`<div class="scoreTop"><div class="comp">${esc(g.league)} · ${esc(g.status||"")}</div><div><button class="btn" onclick="toggleFav('${esc(g.home.name)}')">${isFav(g.home.name)?"★":"☆"} ${esc(g.home.name)}</button> <span class="status">${status}</span></div></div><div class="scoreBody"><div class="mainTeam">${logo(g.home,"mainLogo")}<div class="mainName">${esc(g.home.name)}</div></div><div class="centerScore"><div class="bigScore">${esc(g.home.score)} x ${esc(g.away.score)}</div><div class="minute">${esc(g.minute||"")}</div><div class="comp">${esc(g.time||"")}</div></div><div class="mainTeam">${logo(g.away,"mainLogo")}<div class="mainName">${esc(g.away.name)}</div></div></div><div class="matchTabs">${["overview:Resumo","stats:Estatísticas","momentum:Momentum","timeline:Timeline","lineups:Escalações","teams:Times","players:Jogadores","ai:Leitura IA","post:Pós-jogo","news:Notícias"].map(x=>{let [k,v]=x.split(":");return `<button class="${tab===k?"active":""}" data-tab="${k}">${v}</button>`}).join("")}</div>`;document.querySelectorAll(".matchTabs button").forEach(b=>b.onclick=()=>{tab=b.dataset.tab;renderScoreboard(selected);renderMainPanel()})}
function statRows(s){const f=s.finalizations||{},t=s.shotsOnGoal||{},c=s.corners||{},p=s.possession||{};const rows=[["Finalizações",f.home,f.away],["Chutes no gol",t.home,t.away],["Posse de bola",p.home?p.home+"%":"",p.away?p.away+"%":""],["Escanteios",c.home,c.away]];return `<div class="statsGrid">${rows.map(r=>{const pc=pct(parseFloat(r[1]),parseFloat(r[2]));return `<div class="statRow"><div class="statTop"><span>${esc(r[1]||"-")}</span><span>${esc(r[2]||"-")}</span></div><div class="statLabel">${esc(r[0])}</div><div class="bar"><div class="homeBar" style="width:${pc}%"></div><div class="awayBar" style="width:${100-pc}%"></div></div></div>`}).join("")}</div>`}
function trends(list){return `<div class="trends">${(list||[]).map(x=>`<div class="trend ${esc(x.status||"")}">${esc(x.label)}</div>`).join("")}</div>`}
function momentum(){
 const stats=details?.analysis?.displayStats||details?.displayStats||{};
 const hf=Number(stats.finalizations?.home||0), af=Number(stats.finalizations?.away||0);
 const hc=Number(stats.corners?.home||0), ac=Number(stats.corners?.away||0);
 const hp=Number(stats.possession?.home||0), ap=Number(stats.possession?.away||0);
 const hasReal = !!details?.live && (hf || af || hc || ac || hp || ap);
 if(!hasReal){
   return `<div class="title">Momentum</div><div class="base"><div>Momentum real indisponível para esta partida.</div><div>Ele só aparece quando a API entregar estatísticas confiáveis em tempo real.</div></div>`;
 }
 const homeScore=hf*2+hc*1.5+hp*.12;
 const awayScore=af*2+ac*1.5+ap*.12;
 let bars=[];
 for(let i=0;i<12;i++){
   const homeDominant = homeScore >= awayScore;
   const height = 18 + ((i%5)+1)*7;
   const cls = homeDominant ? (i%4===0?"a":"h") : (i%4===0?"h":"a");
   bars.push(`<div class="mom ${cls}" style="height:${height}px"></div>`);
 }
 const leader = homeScore>=awayScore ? selected.home.name : selected.away.name;
 return `<div class="title">Momentum</div><div class="momentum">${bars.join("")}</div><div class="base"><div><b>${esc(leader)}</b> aparece com maior pressão pelos dados disponíveis.</div><div>Verde representa pressão do mandante; vermelho representa pressão do visitante.</div><div>Base: finalizações, escanteios e posse.</div></div>`;
}
function timeline(){
 const ev=details?.events||[];
 if(!ev.length)return `<div class="title">Timeline</div><div class="base">Sem eventos disponíveis.</div>`;
 return `<div class="title">Timeline</div><div class="timeline">${ev.slice(-12).reverse().map(e=>`<div class="timelineEvent"><div class="ball">${esc(e.minute||"")}</div><div class="eventBody"><b>${esc(e.type||"Evento")}</b><br>${esc(e.detail||"")}<br><small>${esc(e.team||"")} ${e.player?"· "+esc(e.player):""}</small></div></div>`).join("")}</div>`;
}
</small><b>1.85</b></div><div class="odd"><small>Empate</small><b>3.30</b></div><div class="odd"><small>${esc(selected.away.name)}</small><b>4.20</b></div></div><div class="base" style="margin-top:10px"><div>Odds demonstrativas; quando API entregar odds reais, substitui automaticamente.</div></div>`}

function renderMainPanel(){if(!selected){$("mainPanel").innerHTML=`<div class="empty">Selecione uma partida</div>`;return}if(!details){$("mainPanel").innerHTML=`<div class="skeleton"></div><br><div class="skeleton"></div>`;return}const a=details.analysis||{},pre=a.pregame||{},live=a.live||{},main=a.main||{},stats=a.displayStats||details.displayStats||{};if(tab==="stats")$("mainPanel").innerHTML=`<div class="title">Estatísticas</div>${statRows(stats)}`;else if(tab==="momentum")$("mainPanel").innerHTML=momentum();else if(tab==="timeline")$("mainPanel").innerHTML=timeline();else if(tab==="teams")$("mainPanel").innerHTML=`<div class="title">Times</div><div class="grid2"><div class="infoCard"><b>${esc(selected.home.name)}</b><div class="base">${(pre.base||[]).filter(x=>x.includes(selected.home.name)).slice(0,6).map(x=>`<div>${esc(x)}</div>`).join("")||"Perfil em construção."}</div></div><div class="infoCard"><b>${esc(selected.away.name)}</b><div class="base">${(pre.base||[]).filter(x=>x.includes(selected.away.name)).slice(0,6).map(x=>`<div>${esc(x)}</div>`).join("")||"Perfil em construção."}</div></div></div>`;else if(tab==="players")$("mainPanel").innerHTML=`<div class="title">Jogadores</div><div class="grid2"><div class="infoCard"><b>${esc(selected.home.name)}</b><div class="base">Artilheiros, finalizações e notas aparecem conforme player stats disponíveis.</div></div><div class="infoCard"><b>${esc(selected.away.name)}</b><div class="base">Artilheiros, finalizações e notas aparecem conforme player stats disponíveis.</div></div></div>`;else if(tab==="lineups")renderLineups();else if(tab==="ai")$("mainPanel").innerHTML=`<div class="title">Leitura IA</div><div class="aiBox"><div class="aiText">${esc(main.reading||pre.reading||"Leitura limitada.")}</div></div><br>${trends((live.predictions&&live.predictions.length)?live.predictions:pre.predictions)}`;else if(tab==="post"){let p=details.postGame;$("mainPanel").innerHTML=`<div class="title">Pós-jogo</div><div class="aiBox"><div class="aiText">${esc(p?p.text:"Disponível após o fim da partida.")}</div></div><div class="base" style="margin-top:10px">${p?(p.points||[]).map(x=>`<div>${esc(x)}</div>`).join(""):""}</div>`}else if(tab==="news")$("mainPanel").innerHTML=`<div class="title">Notícias</div><div class="base">${(details.news||[]).map(n=>`<div>${esc(n.title)} <small>(${esc(n.source||"")})</small></div>`).join("")||"Notícias relevantes não encontradas."}</div>`;else $("mainPanel").innerHTML=`<div class="title">Resumo da partida</div><div class="aiBox"><div class="aiText">${esc(pre.reading||main.reading||"Leitura limitada.")}</div></div><div class="probs"><div class="prob"><small>${esc(selected.home.name)}</small><br><b>${esc(pre.winPctHome||"-")}%</b></div><div class="prob"><small>${esc(selected.away.name)}</small><br><b>${esc(pre.winPctAway||"-")}%</b></div></div>${statRows(stats)}`}
function renderLineups(){
 const l=details.lineups||[];
 if(!l.length){
   $("mainPanel").innerHTML=`<div class="title">Escalações</div><div class="aiBox"><div class="aiText">Escalações indisponíveis para esta partida.</div></div><div class="base" style="margin-top:10px"><div>O DhuniorStats não mostra escalação simulada.</div><div>Quando a API entregar titulares/reservas reais, eles aparecerão aqui.</div></div>`;
   return;
 }
 const rows = l.slice(0,40).map(x=>{
   const name = x.player?.display_name || x.player_name || x.player?.name || "Jogador";
   const pos = x.position?.name || x.position_name || "";
   const type = x.type?.name || x.type_name || "";
   return `<div class="event"><b>${esc(pos||"-")}</b><div><b>${esc(name)}</b><br><small>${esc(type)}</small></div></div>`;
 }).join("");
 $("mainPanel").innerHTML=`<div class="title">Escalações</div>${rows}`;
}
function renderSide(){if(homeMode){$("sideContent").innerHTML=`<div class="title">DhuniorStats</div><div class="base"><div>Selecione uma partida para ver análise, eventos, tabela e estatísticas.</div></div>`;return}if(!details){$("sideContent").innerHTML=`<div class="skeleton"></div>`;return}const a=details.analysis||{},pre=a.pregame||{},main=a.main||{};if(sideTab==="ia")$("sideContent").innerHTML=`<div class="title">Leitura IA</div><div class="aiText">${esc(main.reading||pre.reading||"Leitura limitada.")}</div>`;else if(sideTab==="base")$("sideContent").innerHTML=`<div class="title">Base usada</div><div class="base">${(main.base||pre.base||[]).slice(0,11).map(x=>`<div>${esc(x)}</div>`).join("")||"Base parcial."}</div>`;else if(sideTab==="events")$("sideContent").innerHTML=`<div class="title">Eventos</div>${(details.events||[]).slice(-14).reverse().map(e=>`<div class="event"><b>${esc(e.minute)}</b><div>${esc(e.type)} · ${esc(e.detail)}<br><small>${esc(e.team)} ${e.player?"· "+esc(e.player):""}</small></div></div>`).join("")||"<div class='base'>Sem eventos disponíveis.</div>"}`;else if(sideTab==="table")loadStandings();else $("sideContent").innerHTML=`<div class="title">${sideTab}</div><div class="base">Área em construção.</div>`}
async function loadStandings(){$("sideContent").innerHTML=`<div class="title">Tabela</div><div class="base">Carregando...</div>`;try{let r=await fetch(`/api/standings?leagueId=${selected.leagueId||""}&season=${selected.season||""}`);let d=await r.json();let rows=(d.standings||[]).slice(0,12);$("sideContent").innerHTML=`<div class="title">Tabela</div><div class="standRow"><b>#</b><b>Time</b><b>J</b><b>Pts</b><b>SG</b></div>`+rows.map(x=>`<div class="standRow"><span>${x.rank||"-"}</span><span>${esc(x.team?.name||"-")}</span><span>${x.all?.played||"-"}</span><span>${x.points||"-"}</span><span>${x.goalsDiff||"-"}</span></div>`).join("")||"<div class='base'>Tabela real indisponível para esta competição/temporada.</div>"}catch(e){$("sideContent").innerHTML=`<div class="title">Tabela</div><div class="base">Tabela real indisponível para esta competição/temporada.</div>`}}
document.querySelectorAll(".sideNav button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".sideNav button").forEach(x=>x.classList.remove("active"));b.classList.add("active");sideTab=b.dataset.side;renderSide()});
async function loadDetails(g){selected=g;details=null;localStorage.setItem("selectedGameKey",`${g.home.name}_${g.away.name}`);renderScoreboard(g);renderMainPanel();renderSide();renderMatches();let gp=encodeURIComponent(JSON.stringify(g));try{let r=await fetch(`/api/game-details?fixtureId=${encodeURIComponent(g.fixtureId||"")}&sportmonksId=${encodeURIComponent(g.sportmonksId||"")}&game=${gp}&_=${Date.now()}`);let d=await r.json();if(!d.ok)throw new Error(d.error);details=d;renderMainPanel();renderSide()}catch(e){$("mainPanel").innerHTML=`<div class="empty">Erro: ${esc(e.message||e)}</div>`}}
function renderMatches(){const games=filteredGames();$("matchList").innerHTML=`<div class="dayTitle">Partidas</div>`+games.map(g=>`<div class="match ${selected&&selected.id===g.id&&!homeMode?"active":""}" data-idx="${allGames.indexOf(g)}"><small>${esc(g.league)} ${g.live?'<b style="color:var(--brand)">● AO VIVO</b>':''}</small><div class="teamLine"><span class="teamName">${miniLogo(g.home)}${esc(g.home.name)}</span><span class="score">${esc(g.home.score)}</span></div><div class="teamLine"><span class="teamName">${miniLogo(g.away)}${esc(g.away.name)}</span><span class="score">${esc(g.away.score)}</span></div><small>${esc(g.status||"")} · ${esc(g.time||"")}</small></div>`).join("")||"<div class='empty'>Nenhum jogo.</div>";document.querySelectorAll(".match").forEach(el=>el.onclick=()=>openMatch(allGames[Number(el.dataset.idx)]));if(homeMode)renderHome()}
async function loadGames(){let date=$("dateInput").value||new Date().toISOString().slice(0,10);$("matchList").innerHTML=`<div class="empty">Buscando jogos...</div>`;try{let r=await fetch(`/api/games?date=${date}&_=${Date.now()}`);let d=await r.json();allGames=d.games||[];renderMatches();showHome()}catch(e){$("matchList").innerHTML=`<div class="empty">Erro ao carregar jogos.</div>`}}
document.querySelectorAll(".quick button").forEach(b=>b.onclick=()=>{document.querySelectorAll(".quick button").forEach(x=>x.classList.remove("active"));b.classList.add("active");quick=b.dataset.q;renderMatches()});
$("dateInput").value=new Date().toISOString().slice(0,10);$("refreshBtn").onclick=loadGames;$("searchInput").oninput=renderMatches;$("filterInput").onchange=renderMatches;loadGames();setInterval(loadGames,60000);
</script>
