<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DhuniorStats Match Centre Pro</title>
<style>
:root{--red:#ef233c;--ink:#07152f;--muted:#64748b;--line:#dbe5f1;--bg:#eef2f7;--card:#fff;--green:#16a34a;--orange:#f59e0b}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
header{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 16px;position:sticky;top:0;z-index:10}
.logo{font-size:23px;font-weight:1000}.logo span{color:var(--red)}button{border:0;border-radius:12px;padding:11px 14px;background:var(--red);color:#fff;font-weight:900;cursor:pointer}.ghost{background:#f8fafc;color:var(--ink);border:1px solid var(--line)}
main{max-width:1280px;margin:18px auto;padding:0 12px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px #0f172a0a}
.gridTop{display:grid;grid-template-columns:1fr 300px 1fr;gap:16px;align-items:center;text-align:center}.teamName{font-size:24px;font-weight:1000}.score{font-size:42px;font-weight:1000}.badge{display:inline-block;border-radius:999px;padding:6px 10px;background:#f1f5f9;font-size:12px;font-weight:900;color:#334155}.live{background:#fee2e2;color:#991b1b}.post{background:#dcfce7;color:#166534}.pre{background:#dbeafe;color:#1e40af}.teamLogo{width:58px;height:58px;object-fit:contain}
.search{display:grid;grid-template-columns:1fr 1fr 160px;gap:10px}.search input{padding:12px;border:1px solid var(--line);border-radius:12px;font-weight:800}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.tab{background:#fff;color:#0f172a;border:1px solid var(--line)}.tab.active{background:var(--red);color:#fff;border-color:var(--red)}
.statRow{display:grid;grid-template-columns:90px 1fr 90px;gap:12px;align-items:center;border-top:1px solid #e2e8f0;padding:10px}.statLabel{text-align:center;font-weight:900}.bar{height:9px;background:#e2e8f0;border-radius:99px;overflow:hidden;display:flex}.barHome{background:var(--red)}.barAway{background:#0f172a}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.lineTeam{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff}.lineHead{background:#f8fafc;border-bottom:1px solid var(--line);padding:12px 14px;font-weight:1000;display:flex;justify-content:space-between}.players{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:12px}.player{border:1px solid var(--line);border-radius:12px;padding:9px;background:#fbfdff;min-height:54px}.player b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.player span{display:block;font-size:11px;color:var(--muted);margin-top:3px}.sectionTitle{font-size:14px;font-weight:1000;margin:12px 12px 0}
.timeline{display:grid;gap:8px}.event{display:grid;grid-template-columns:70px 70px 1fr;gap:10px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.event .min{font-weight:1000}.event .ico{font-size:20px;text-align:center}.event.home{border-left:5px solid var(--red)}.event.away{border-left:5px solid #0f172a}
.aiBox{border:1px solid #fecaca;background:#fff1f2;border-radius:16px;padding:15px}.aiBox h3{margin:0 0 8px}.aiBox li{margin:8px 0}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}.kpi{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;text-align:center}.kpi b{font-size:22px;display:block}.kpi span{font-size:12px;color:var(--muted);font-weight:900}
.contextGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.ctx{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}.ctx h3{margin:0 0 8px}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#7c2d12;border-radius:12px;padding:12px;font-weight:800}.raw pre{background:#081126;color:#e2e8f0;border-radius:14px;padding:12px;overflow:auto;max-height:480px}
.momentumBars{height:130px;display:flex;align-items:center;gap:4px;overflow:auto;border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px}.mom{width:9px;flex:0 0 9px;border-radius:5px}.mom.home{background:var(--red)}.mom.away{background:#0f172a}
@media(max-width:900px){.gridTop,.two,.contextGrid,.search{grid-template-columns:1fr}.players{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}.score{font-size:34px}}
</style>
</head>
<body>
<header>
  <div class="logo">Dhunior<span>Stats</span></div>
  <b>Match Centre Pro V53</b>
  <button class="ghost" onclick="location.href='/'">Voltar</button>
</header>

<main>
  <div class="card">
    <div class="search">
      <input id="fixtureId" placeholder="Fixture ID">
      <input id="filters" placeholder="Filtros opcionais: eventTypes:18,14;fixtureStatisticTypes:42,86,34,45">
      <button id="loadBtn" onclick="loadCentreSafe()">Carregar</button>
    </div>
  </div>

  <div id="app"></div>
</main>

<script>
let data=null, active='overview'; const DEBUG_MODE=new URLSearchParams(location.search).get('debug')==='1';
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function badgeClass(phase){return phase==='live'?'live':phase==='post'?'post':'pre'}
let LOAD_LOCK=false; async function loadCentreSafe(){ if(LOAD_LOCK)return; LOAD_LOCK=true; loadBtn.disabled=true; try{ await loadCentre(); } finally{ setTimeout(()=>{LOAD_LOCK=false;loadBtn.disabled=false},2500); } }
async function loadCentre(){
  const id=$('fixtureId').value.trim();
  if(!id){$('app').innerHTML='<div class="card notice">Informe o fixture ID.</div>';return}
  $('app').innerHTML='<div class="card"><div class="notice">Carregando Match Centre Pro...</div></div>';
  const f=$('filters').value.trim();
  const qs=f?'?filters='+encodeURIComponent(f):'';
  try{
    const r=await fetch('/api/match-centre-pro/'+encodeURIComponent(id)+qs+'&_='+Date.now()).then(x=>x.json());
    if(!r.ok) throw new Error(r.error||'Erro');
    data=r; active='overview'; render();
  }catch(e){$('app').innerHTML='<div class="card notice">Erro: '+esc(e.message)+'</div>'}
}
function render(){
  if(!data) return;
  $('app').innerHTML = header()+tabs()+panel();
}
function header(){
  const f=data.fixture, h=f.home||{}, a=f.away||{}, st=f.state||{};
  return `<div class="card">
    <div class="gridTop">
      <div>${h.logo?`<img class="teamLogo" src="${esc(h.logo)}">`:''}<div class="teamName">${esc(h.name||'Mandante')}</div></div>
      <div>
        <div class="badge ${badgeClass(st.phase)}">${esc(st.name||st.code||'Status')}</div>
        <div class="score">${esc(f.score?.home??0)} - ${esc(f.score?.away??0)}</div>
        <div><b>${esc(f.league||'')}</b></div>
        <div class="muted">${esc(f.starting_at||'')} ${f.venue?`· ${esc(f.venue)}`:''}</div>
      </div>
      <div>${a.logo?`<img class="teamLogo" src="${esc(a.logo)}">`:''}<div class="teamName">${esc(a.name||'Visitante')}</div></div>
    </div>
  </div>`;
}
function tabs(){
  let list=[['overview','Resumo'],['stats','Estatísticas'],['timeline','Timeline'],['lineups','Escalações'],['ai','Leitura IA'],['context','Contexto']]; if(DEBUG_MODE) list.push(['coverage','Cobertura'],['raw','RAW técnico']);
  return `<div class="tabs">${list.map(([k,v])=>`<button class="tab ${active===k?'active':''}" onclick="active='${k}';render()">${v}</button>`).join('')}</div>`;
}
function panel(){
  if(active==='stats') return stats();
  if(active==='timeline') return timeline();
  if(active==='lineups') return lineups();
  if(active==='ai') return ai();
  if(active==='context') return context();
  if(active==='coverage') return coverage();
  if(active==='raw') return raw();
  return overview();
}
function overview(){
  const c=data.coverage||{};
  return `<div class="card"><div class="kpis">
    <div class="kpi"><b>${c.statistics||0}</b><span>stats</span></div>
    <div class="kpi"><b>${c.events||0}</b><span>eventos</span></div>
    <div class="kpi"><b>${c.lineups||0}</b><span>jogadores</span></div>
    <div class="kpi"><b>${c.homeStarters||0}</b><span>titulares casa</span></div>
    <div class="kpi"><b>${c.awayStarters||0}</b><span>titulares fora</span></div>
    <div class="kpi"><b>${c.sidelined||0}</b><span>desfalques</span></div>
  </div></div>${ai()}`;
}
function stats(){
  const rows=(data.stats?.comparison||[]).filter(r=>r.home!==null||r.away!==null);
  if(!rows.length) return '<div class="card notice">Sem estatísticas retornadas para este fixture.</div>';
  return `<div class="card"><h2>Estatísticas</h2>${rows.map(r=>{
    const h=Number(r.home)||0,a=Number(r.away)||0,t=Math.max(h+a,1),hp=Math.round(h/t*100);
    return `<div class="statRow"><b>${esc(r.home??'-')}</b><div><div class="statLabel">${esc(r.label)}</div><div class="bar"><span class="barHome" style="width:${hp}%"></span><span class="barAway" style="width:${100-hp}%"></span></div></div><b style="text-align:right">${esc(r.away??'-')}</b></div>`
  }).join('')}</div>`;
}
function timeline(){
  const ev=data.events||[];
  if(!ev.length) return '<div class="card notice">Sem eventos retornados.</div>';
  return `<div class="card"><h2>Timeline</h2><div class="timeline">${ev.map(e=>`<div class="event ${esc(e.side)}"><div class="min">${esc(e.display_minute)}'</div><div class="ico">${esc(e.icon)}</div><div><b>${esc(e.type)}</b> ${esc(e.player)} ${e.related_player?'→ '+esc(e.related_player):''} ${e.result?`<b>${esc(e.result)}</b>`:''}<br><span class="muted">${esc(e.info||e.addition||'')}</span></div></div>`).join('')}</div></div>`;
}
function pcard(p){
  return `<div class="player">${p.image_path?`<img src="${esc(p.image_path)}" style="width:30px;height:30px;object-fit:cover;border-radius:50%;float:right">`:''}<b>${p.jersey_number?'#'+esc(p.jersey_number)+' ':''}${esc(p.player_name)}</b><span>${esc(p.position||p.lineup_type||'Jogador')} ${p.formation_field?'· '+esc(p.formation_field):''} ${p.country?'· '+esc(p.country):''}</span></div>`;
}
function teamLine(title,g){
  const starters=g?.starters||[], bench=g?.bench||[];
  return `<div class="lineTeam"><div class="lineHead">${esc(title)} <span>${starters.length} titulares</span></div>
    <div class="sectionTitle">Titulares</div><div class="players">${starters.map(pcard).join('')||'<div class="notice">Sem titulares</div>'}</div>
    <div class="sectionTitle">Banco</div><div class="players">${bench.map(pcard).join('')||'<div class="notice">Sem banco</div>'}</div>
  </div>`;
}
function lineups(){
  const l=data.lineups||{}, f=data.fixture;
  if(!(l.all||[]).length) return '<div class="card notice">Sem escalação retornada para este fixture.</div>';
  return `<div class="card"><h2>Escalações</h2><div class="two">${teamLine(f.home?.name||'Mandante',l.home)}${teamLine(f.away?.name||'Visitante',l.away)}</div>${(l.unknown||[]).length?`<div class="notice" style="margin-top:12px">${l.unknown.length} jogadores sem time identificado no retorno da API.</div>`:''}</div>`;
}
function ai(){
  const a=data.ai||{};
  return `<div class="card"><div class="aiBox"><h3>Leitura IA contextual</h3><b>${esc(a.headline||'Aguardando dados.')}</b><ul>${(a.points||[]).map(p=>`<li>${esc(p)}</li>`).join('')}</ul></div></div>`;
}
function context(){
  const c=data.context||{}, f=data.fixture||{};
  return `<div class="card"><h2>Contexto</h2><div class="contextGrid">
    <div class="ctx"><h3>Informações</h3><div>Estado: <b>${esc(f.state?.name||'')}</b></div><div>Estádio: <b>${esc(f.venue||'-')}</b></div><div>Tem odds: <b>${f.has_odds?'sim':'não'}</b></div></div>
    <div class="ctx"><h3>Desfalques</h3>${(c.sidelined||[]).map(s=>`<div>${esc(s.side)} · <b>${esc(s.player||'-')}</b> · ${esc(s.type||'')}</div>`).join('')||'<div class="muted">Sem desfalques retornados.</div>'}</div>
    <div class="ctx"><h3>Técnicos</h3>${(c.coaches||[]).map(s=>`<div>${esc(s.side)} · <b>${esc(s.name)}</b></div>`).join('')||'<div class="muted">Sem técnicos retornados.</div>'}</div>
    <div class="ctx"><h3>Clima/gramado/metadados</h3>${c.weather?`<pre>${esc(JSON.stringify(c.weather,null,2))}</pre>`:'<div class="muted">Sem weather/pitch retornado.</div>'}</div>
  </div></div>`;
}
function coverage(){
  const c=data.coverage||{};
  return `<div class="card"><h2>Cobertura retornada</h2><div class="kpis">${Object.entries(c).map(([k,v])=>`<div class="kpi"><b>${esc(v)}</b><span>${esc(k)}</span></div>`).join('')}</div></div>`;
}
function raw(){
  return `<div class="card raw"><h2>RAW normalizado</h2><pre>${esc(JSON.stringify({fixture:data.fixture,stats:data.stats,events:data.events,lineups:data.lineups,context:data.context,coverage:data.coverage},null,2))}</pre></div>`;
}
const params=new URLSearchParams(location.search);
fixtureId.value=params.get('fixtureId')||params.get('id')||'';
filters.value=params.get('filters')||'';
if(fixtureId.value) loadCentreSafe();
</script>
</body>
</html>
