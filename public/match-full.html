<!DOCTYPE html><html lang="pt-br"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DhuniorStats Match Full</title>
<style>body{font-family:Arial;background:#eef2f7;margin:0;color:#08172f}header{height:52px;background:#fff;border-bottom:1px solid #d8e2ef;display:flex;align-items:center;gap:10px;padding:0 14px}.logo{font-size:22px;font-weight:900}.logo span{color:#ef233c}main{max-width:1100px;margin:18px auto;padding:0 12px}.card{background:#fff;border:1px solid #d8e2ef;border-radius:14px;padding:16px;margin-bottom:12px}.field{padding:11px;border:1px solid #d8e2ef;border-radius:10px;font-weight:700;width:260px}button{padding:11px 14px;border:0;border-radius:10px;background:#ef233c;color:white;font-weight:900}pre{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:12px;overflow:auto;max-height:500px}.pill{display:inline-block;border:1px solid #d8e2ef;border-radius:999px;padding:6px 9px;margin:4px;font-weight:800}.bad{color:#ef233c}</style></head><body>
<header><div class="logo">Dhunior<span>Stats</span></div><b>Match Full Debug</b><button onclick="location.href='/'">Voltar</button></header>
<main><div class="card"><h2>Testar /api/match-full</h2><input id="fixture" class="field" placeholder="Fixture ID"><button onclick="go()">Carregar</button></div><div id="out"></div></main>
<script>
const out=document.getElementById('out');
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
async function go(){
 const id=document.getElementById('fixture').value.trim();
 out.innerHTML='<div class="card">Carregando...</div>';
 const d=await fetch('/api/match-full?fixtureId='+encodeURIComponent(id)+'&_='+Date.now()).then(r=>r.json());
 if(!d.ok){out.innerHTML='<div class="card"><b class="bad">Erro:</b> '+esc(d.error)+'</div>';return}
 out.innerHTML='<div class="card"><h2>'+esc(d.fixture?.home?.name)+' '+esc(d.fixture?.score?.home)+' x '+esc(d.fixture?.score?.away)+' '+esc(d.fixture?.away?.name)+'</h2>'
 +Object.entries(d.coverage||{}).map(([k,v])=>'<span class="pill">'+esc(k)+': '+esc(v)+'</span>').join('')
 +'</div><div class="card"><h2>IA</h2><p>'+esc(d.ai?.text)+'</p><ul>'+((d.ai?.points||[]).map(x=>'<li>'+esc(x)+'</li>').join(''))+'</ul></div>'
 +'<div class="card"><h2>RAW normalizado</h2><pre>'+esc(JSON.stringify({fixture:d.fixture,statistics:d.statistics,events:d.events,lineups:d.lineups,formations:d.formations,trends:d.trends,comments:d.comments},null,2))+'</pre></div>';
}
const p=new URLSearchParams(location.search);document.getElementById('fixture').value=p.get('fixtureId')||p.get('id')||''; if(document.getElementById('fixture').value)go();
</script></body></html>
