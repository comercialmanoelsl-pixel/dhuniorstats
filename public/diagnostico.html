<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DhuniorStats - Diagnóstico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#dbe4ef;--text:#0f172a;--muted:#64748b;--brand:#ef233c;--ok:#16a34a;--bad:#dc2626;--warn:#d97706}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial;background:var(--bg);color:var(--text)}header{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:12px}.logo{font-size:23px;font-weight:950}.logo span{color:var(--brand)}
main{max-width:1180px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 8px 20px rgba(15,23,42,.05)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.field{border:1px solid var(--line);border-radius:10px;padding:10px;font-weight:700}.btn{background:var(--brand);color:#fff;border:0;border-radius:10px;padding:11px 15px;font-weight:900;cursor:pointer}
.status{display:inline-flex;padding:5px 9px;border-radius:999px;color:#fff;font-size:12px;font-weight:900}.ok{background:var(--ok)}.bad{background:var(--bad)}.warn{background:var(--warn)}
.source{display:grid;grid-template-columns:190px 1fr;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.muted{color:var(--muted);font-size:13px;line-height:1.45}pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:12px;border-radius:12px;overflow:auto}.pill{display:inline-flex;margin:3px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:800}
@media(max-width:800px){.grid{grid-template-columns:1fr}.source{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="logo">Dhunior<span>Stats</span></div><b>Diagnóstico de APIs</b></header>
<main>
  <div class="card">
    <h2>Diagnóstico por partida</h2>
    <p class="muted">Use isso para descobrir exatamente qual API achou o jogo. Se aparecer Fixture ID com stats/events/lineups OK, abra esse mesmo fixture na tela principal ou em /components.html.</p>
    <div class="grid">
      <input class="field" id="home" placeholder="Mandante. Ex: Corinthians">
      <input class="field" id="away" placeholder="Visitante. Ex: Atletico-MG">
      <input class="field" id="date" type="date">
    </div>
    <br>
    <button class="btn" onclick="run()">Diagnosticar</button>
  </div>
  <div id="out"></div>
</main>
<script>
const $=id=>document.getElementById(id);
$('date').value=new Date().toISOString().slice(0,10);
const qs=new URLSearchParams(location.search);
if(qs.get('home')) $('home').value=qs.get('home');
if(qs.get('away')) $('away').value=qs.get('away');
if(qs.get('date')) $('date').value=qs.get('date');

function badge(ok){return `<span class="status ${ok?'ok':'bad'}">${ok?'OK':'FALHOU'}</span>`}
function item(k,v){return `<div class="source"><b>${k}</b><div>${v}</div></div>`}
function sourceCard(name,s){
  let html=`<div class="card"><h3>${name}</h3>`;
  if(s.fixtureFound!==undefined) html+=item('Partida encontrada', badge(s.fixtureFound));
  if(s.fixtureId) html+=item('Fixture ID', `<span class="pill">${s.fixtureId}</span>`);
  if(s.stats) html+=item('Estatísticas', `${badge(s.stats.ok)} <span class="muted">${s.stats.note||''}</span>`);
  if(s.events) html+=item('Eventos', `${badge(s.events.ok)} <span class="muted">${s.events.note||''}</span>`);
  if(s.lineups) html+=item('Escalações', `${badge(s.lineups.ok)} <span class="muted">${s.lineups.note||''}</span>`);
  if(s.players) html+=item('Jogadores', `${badge(s.players.ok)} <span class="muted">${s.players.note||''}</span>`);
  if(s.teams) html+=item('Últimos jogos', `${badge(s.teams.ok)} <span class="muted">${s.teams.note||''}</span>`);
  if(s.note) html+=item('Nota', `<span class="muted">${s.note}</span>`);
  if(s.errors?.length) html+=item('Erros', `<pre>${JSON.stringify(s.errors,null,2)}</pre>`);
  html+=`</div>`;
  return html;
}
async function run(){
  const home=$('home').value.trim(), away=$('away').value.trim(), date=$('date').value;
  if(!home||!away){alert('Informe mandante e visitante');return}
  $('out').innerHTML='<div class="card">Carregando diagnóstico...</div>';
  const r=await fetch(`/api/debug-match?home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}&date=${encodeURIComponent(date)}&_=${Date.now()}`);
  const d=await r.json();
  if(!d.ok){$('out').innerHTML=`<div class="card"><b>Erro:</b> ${d.error}</div>`;return}
  let html='<div class="card"><h2>Resumo</h2>';
  Object.entries(d.summary).forEach(([k,v])=>html+=`<span class="pill">${k}: ${v?'OK':'NÃO'}</span>`);
  html+='<h3>Recomendações</h3><div class="muted">'+d.recommendation.map(x=>`• ${x}`).join('<br>')+'</div></div>';
  html+=sourceCard('API-Football',d.sources.apiFootball);
  html+=sourceCard('SportMonks',d.sources.sportmonks);
  html+=sourceCard('ESPN',d.sources.espn);
  html+=sourceCard('NewsAPI',d.sources.news);
  html+=sourceCard('Odds',d.sources.odds);
  $('out').innerHTML=html;
}
if($('home').value && $('away').value) run();
</script>

<script>
function openComponentsFixture(id){
  if(!id) return alert("Sem fixture id");
  location.href = "/components.html?fixtureId="+encodeURIComponent(id);
}
</script>

</body>
</html>
