<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DhuniorStats - SportMonks Auditor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef2f7;--card:#fff;--line:#dbe4ef;--text:#0f172a;--muted:#64748b;--brand:#ef233c;--ok:#16a34a;--bad:#dc2626}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial;background:var(--bg);color:var(--text)}
header{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 18px}.logo{font-size:23px;font-weight:950}.logo span{color:var(--brand)}
main{max-width:1220px;margin:18px auto;padding:0 14px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 8px 20px rgba(15,23,42,.05)}
.grid{display:grid;grid-template-columns:1fr 1fr auto;gap:10px}.field{border:1px solid var(--line);border-radius:10px;padding:10px;font-weight:700}.btn{background:var(--brand);color:#fff;border:0;border-radius:10px;padding:11px 15px;font-weight:900;cursor:pointer}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}.kpi{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:12px}.kpi b{font-size:22px}.muted{color:var(--muted);font-size:13px;line-height:1.45}
.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid var(--line);padding:9px;text-align:left}.ok{color:var(--ok);font-weight:900}.bad{color:var(--bad);font-weight:900}.pill{display:inline-flex;margin:3px;padding:5px 8px;border-radius:999px;border:1px solid var(--line);font-size:12px;font-weight:800}
pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:12px;border-radius:12px;overflow:auto;max-height:360px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><div class="logo">Dhunior<span>Stats</span></div><b>SportMonks Auditor</b><button class="btn" onclick="location.href='/'">Voltar</button></header>
<main>
  <div class="card">
    <h2>Auditar SportMonks</h2>
    <p class="muted">Mostra o que a SportMonks realmente entrega no seu plano. Odds SportMonks estão bloqueadas no seu plano, então o auditor não usa odds no pacote geral.</p>
    <div class="grid">
      <input class="field" id="date" type="date">
      <input class="field" id="fixtureId" placeholder="Fixture ID opcional">
      <button class="btn" onclick="run()">Auditar</button><button class="btn" onclick="inspectRaw()">RAW</button><button class="btn" onclick="testIncludes()">Testar includes</button>
    </div>
  </div>
  <div id="out"></div>
</main>
<script>
const $=id=>document.getElementById(id);
$('date').value=new Date().toISOString().slice(0,10);
function yes(v){return v?'<span class="ok">SIM</span>':'<span class="bad">NÃO</span>'}
function val(obj){return obj?.count ?? 0}
function row(f){
  return `<tr>
    <td><b>${f.fixtureId||'-'}</b><br><span class="muted">${f.name||''}</span></td>
    <td>${yes(f.participants?.ok)} <small>${val(f.participants)}</small></td>
    <td>${yes(f.scores?.ok)} <small>${val(f.scores)}</small></td>
    <td>${yes(f.events?.ok)} <small>${val(f.events)}</small></td>
    <td>${yes(f.statistics?.ok)} <small>${val(f.statistics)}</small></td>
    <td>${yes(f.lineups?.ok)} <small>${val(f.lineups)}</small></td>
    <td>${yes(f.formations?.ok)} <small>${val(f.formations)}</small></td>
    <td>${yes(f.odds?.ok)} <small>${val(f.odds)}</small></td>
  </tr>`
}
async function run(){
  const date=$('date').value;
  const fixtureId=$('fixtureId').value.trim();
  $('out').innerHTML='<div class="card">Carregando auditoria...</div>';
  const url=fixtureId?`/api/sportmonks-audit?fixtureId=${encodeURIComponent(fixtureId)}&date=${date}`:`/api/sportmonks-audit?date=${date}`;
  const d=await fetch(url+'&_='+Date.now()).then(r=>r.json());
  if(!d.ok){$('out').innerHTML=`<div class="card"><b>Erro:</b> ${d.error}</div>`;return}
  let html='';
  if(d.coverage){
    html+=`<div class="card"><h2>Resumo da cobertura</h2><div class="kpis">
      <div class="kpi"><small>Total fixtures</small><br><b>${d.coverage.totalFixtures}</b></div>
      <div class="kpi"><small>Amostra</small><br><b>${d.coverage.sampledFixtures}</b></div>
      <div class="kpi"><small>Events</small><br><b>${d.coverage.events}</b></div>
      <div class="kpi"><small>Statistics</small><br><b>${d.coverage.statistics}</b></div>
      <div class="kpi"><small>Lineups</small><br><b>${d.coverage.lineups}</b></div>
      <div class="kpi"><small>Formations</small><br><b>${d.coverage.formations}</b></div>
      <div class="kpi"><small>Odds</small><br><b>${d.coverage.odds}</b></div>
    </div></div>`;
  }
  html+=`<div class="card"><h2>Includes testados</h2>${d.includes.map(x=>`<span class="pill">${x}</span>`).join('')}</div>`;
  html+=`<div class="card"><h2>Fixtures auditadas</h2><table class="table"><thead><tr><th>Fixture</th><th>Participants</th><th>Scores</th><th>Events</th><th>Statistics</th><th>Lineups</th><th>Formations</th><th>Odds</th></tr></thead><tbody>${(d.fixtures||[]).map(row).join('')}</tbody></table></div>`;
  if(d.rawFixture) html+=`<div class="card"><h2>Raw fixture</h2><pre>${JSON.stringify(d.rawFixture,null,2)}</pre></div>`;
  $('out').innerHTML=html;
}
run();
</script>

<script>
async function inspectRaw(){
  const fixtureId=document.getElementById('fixtureId').value.trim();
  if(!fixtureId){alert('Coloque o Fixture ID primeiro');return}
  document.getElementById('out').innerHTML='<div class="card">Inspecionando RAW...</div>';
  const d=await fetch('/api/sportmonks-raw?fixtureId='+encodeURIComponent(fixtureId)+'&_='+Date.now()).then(r=>r.json());
  if(!d.ok){document.getElementById('out').innerHTML='<div class="card"><b>Erro:</b> '+d.error+'</div>';return}
  let html='<div class="card"><h2>RAW Inspector</h2><p class="muted">Mostra o JSON completo por grupo de include.</p></div>';
  Object.entries(d.results).forEach(([name,r])=>{
    html+=`<div class="card"><h3>${name}</h3>`;
    if(!r.ok){html+=`<p class="bad">${r.error}</p></div>`;return}
    html+=`<p class="muted">Include: ${r.include||'(sem include)'}</p>`;
    html+=`<p>${Object.entries(r.counts).map(([k,v])=>`<span class="pill">${k}: ${v===null?'n/a':v}</span>`).join('')}</p>`;
    html+=`<pre>${JSON.stringify(r.raw,null,2)}</pre></div>`;
  });
  document.getElementById('out').innerHTML=html;
}
async function testIncludes(){
  const fixtureId=document.getElementById('fixtureId').value.trim();
  if(!fixtureId){alert('Coloque o Fixture ID primeiro');return}
  document.getElementById('out').innerHTML='<div class="card">Testando includes...</div>';
  const d=await fetch('/api/sportmonks-includes-test?fixtureId='+encodeURIComponent(fixtureId)+'&_='+Date.now()).then(r=>r.json());
  let html='<div class="card"><h2>Teste de Includes</h2><table class="table"><thead><tr><th>Include</th><th>Status</th><th>Count</th><th>Erro/Keys</th></tr></thead><tbody>';
  (d.tests||[]).forEach(t=>{
    html+=`<tr><td>${t.include}</td><td>${t.ok?'<span class="ok">OK</span>':'<span class="bad">ERRO</span>'}</td><td>${t.count??'-'}</td><td><span class="muted">${t.error||((t.keys||[]).join(', '))}</span></td></tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('out').innerHTML=html;
}
</script>

</body>
</html>
